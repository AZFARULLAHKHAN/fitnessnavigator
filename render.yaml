services:
  - type: web
    name: fitnessnavigator
    env: python
    buildCommand: pip install -r FitnessNavigator/requirements.txt
    startCommand: cd FitnessNavigator && gunicorn app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: SECRET_KEY
        generateValue: true
      - key: GEMINI_API_KEY
        sync: false
